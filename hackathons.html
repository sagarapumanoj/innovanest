<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hackathons - InnovaNest</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f8f8;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #4e54c8;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    header .logo {
      font-size: 1.8rem;
      font-weight: bold;
    }

    header nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 2rem;
    }

    header nav ul li {
      display: inline-block;
    }

    header nav ul li a {
      text-decoration: none;
      color: white;
      font-weight: 600;
    }

    main {
      padding: 2rem;
    }

    .hackathon-card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
      padding: 1.5rem;
      transition: all 0.3s ease;
    }

    .hackathon-card:hover {
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      transform: translateY(-5px);
    }

    .hackathon-card h3 {
      margin: 0;
      font-size: 1.8rem;
      color: #4e54c8;
    }

    .hackathon-card p {
      margin: 5px 0;
      color: #555;
    }

    .hackathon-card .theme {
      background-color: #4e54c8;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      display: inline-block;
      margin-top: 10px;
    }

    .footer {
      background-color: #4e54c8;
      color: white;
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
    }

  </style>
</head>

<body>
  <header>
    <div class="logo">🚀 InnovaNest</div>
    <nav>
      <ul>
        <li><a href="main.html">Dashboard</a></li>
        <li><a href="index.html">Logout</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Upcoming Hackathons</h1>
    <div id="hackathon-list">
      <!-- Hackathon cards will be dynamically added here -->
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2025 InnovaNest | All rights reserved.</p>
  </footer>

  <script>
    const hackathons = [
      { name: "AI Future Hack", date: "2025-05-10", location: "Hyderabad", theme: "Artificial Intelligence" },
      { name: "WebVerse Challenge", date: "2025-06-14", location: "Bangalore", theme: "Web Development" },
      { name: "IoT Impact Hack", date: "2025-07-20", location: "Delhi", theme: "IoT & Smart Devices" },
      { name: "Code Green", date: "2025-08-05", location: "Mumbai", theme: "Sustainability Tech" },
      { name: "HealthTech Sprint", date: "2025-05-25", location: "Chennai", theme: "Healthcare Innovation" },
      { name: "FinTech Fusion", date: "2025-06-02", location: "Pune", theme: "Finance & Blockchain" },
      { name: "EduHack 2025", date: "2025-07-11", location: "Kolkata", theme: "EdTech Solutions" },
      { name: "SecureCode Jam", date: "2025-06-30", location: "Noida", theme: "Cybersecurity" },
      { name: "DataDive", date: "2025-07-18", location: "Ahmedabad", theme: "Data Science" },
      { name: "AgroHack", date: "2025-08-12", location: "Bhopal", theme: "AgriTech" }
    ];

    const hackathonList = document.getElementById('hackathon-list');

    hackathons.forEach(hackathon => {
      const hackathonCard = document.createElement('div');
      hackathonCard.className = 'hackathon-card';

      hackathonCard.innerHTML = `
        <h3>${hackathon.name}</h3>
        <p><strong>Date:</strong> ${hackathon.date}</p>
        <p><strong>Location:</strong> ${hackathon.location}</p>
        <span class="theme">${hackathon.theme}</span>
      `;

      hackathonList.appendChild(hackathonCard);
    });
  </script>
</body>
</html>
