<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - InnovaNest</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-box">
      <h2><i class="fas fa-user-lock"></i> Login to InnovaNest</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p class="small-text">Forgot password? <a href="#">Click here</a></p>
        <p class="small-text">Don't have an account? <a href="signup.html">Sign up</a></p>
        <p class="demo-hint">Use: demo@example.com / 123456</p>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
